<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mia — Smart Booking System</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display:ital@0;1&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f2ee;--dark:#1a1c2e;--green:#2d6a4f;--blue:#2563eb;
  --border:#ddd8ce;--white:#fff;--text:#1a1c2e;--sub:#6b7080;
  --red:#dc2626;--amber:#d97706;--r:14px;
}
html,body{min-height:100vh;font-family:'DM Sans',sans-serif;background:#e8e4dc;display:flex;align-items:center;justify-content:center;padding:10px}
.shell{width:100%;max-width:440px;border-radius:24px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.18);border:1px solid var(--border)}

/* Header */
.hdr{background:var(--dark);padding:13px 16px;display:flex;align-items:center;gap:11px}
.av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--blue));display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.av-l{font-family:'DM Serif Display',serif;font-size:20px;color:#fff;font-style:italic}
.dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:#52b788;border:2px solid var(--dark);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.hname{font-family:'DM Serif Display',serif;font-size:16px;color:#fff}
.hsub{font-size:10px;color:#9a9fbe;margin-top:1px}
.badge{font-size:10px;font-weight:600;text-transform:uppercase;background:#1D9E75;color:#fff;padding:3px 9px;border-radius:20px;margin-left:auto}

/* Status bar */
.sbar{background:#1e2240;padding:5px 14px;font-size:11px;color:#8fa3c8;display:flex;align-items:center;justify-content:space-between;gap:6px}
.sbar-left{display:flex;align-items:center;gap:6px}
.sdot{width:6px;height:6px;border-radius:50%;background:#52b788;flex-shrink:0}
.user-count{font-size:10px;color:#52b788;font-weight:500}

/* Chat */
.chat{height:430px;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:8px;background:var(--bg);scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:3px}
.chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{display:flex;gap:7px;align-items:flex-end;animation:up .2s ease both}
.msg.u{flex-direction:row-reverse}
@keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.mav{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px}
.mav.b{background:linear-gradient(135deg,var(--green),var(--blue));font-family:'DM Serif Display',serif;font-style:italic;font-size:15px}
.mav.u{background:#5a5047;font-weight:600;font-size:11px}
.bub{max-width:84%;padding:9px 13px;font-size:13px;line-height:1.65;border-radius:14px}
.bub.b{background:var(--white);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:3px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.bub.u{background:var(--green);color:#fff;border-bottom-right-radius:3px;border-bottom-left-radius:14px}
.typing{display:flex;align-items:center;gap:4px;padding:10px 13px;background:var(--white);border:1px solid var(--border);border-radius:14px;border-bottom-left-radius:3px;width:fit-content}
.td{width:5px;height:5px;border-radius:50%;background:#bbb;animation:bop .8s infinite}
.td:nth-child(2){animation-delay:.13s}.td:nth-child(3){animation-delay:.26s}
@keyframes bop{0%,60%,100%{transform:none}30%{transform:translateY(-4px)}}

/* Choice buttons */
.cw{margin-left:35px;margin-top:-2px;max-width:86%}
.cs{display:flex;flex-direction:column;gap:4px}
.cb{text-align:left;padding:8px 12px;border-radius:9px;border:1.5px solid var(--green);background:transparent;color:var(--green);font-size:12.5px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s}
.cb:hover{background:var(--green);color:#fff}
.cb.sc{border-color:var(--blue);color:var(--blue)}
.cb.sc:hover{background:var(--blue);color:#fff}
.cb.pk{opacity:.55;pointer-events:none}

/* Date picker */
.date-wrap{margin-left:35px;margin-top:-2px;max-width:86%}
.date-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.date-btn{padding:11px 8px;border-radius:11px;border:1.5px solid var(--green);background:#f6fbf8;color:var(--green);font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;text-align:center;transition:all .16s;line-height:1.4;position:relative}
.date-btn:hover{background:var(--green);color:#fff;transform:scale(1.02)}
.date-btn.pk{background:var(--green);color:#fff;pointer-events:none}
.date-btn.dm{opacity:.4;pointer-events:none}
.date-day{font-size:13px;font-weight:600;display:block}
.date-sub{font-size:10px;display:block;margin-top:1px;opacity:.8}
.slots-badge{position:absolute;top:4px;right:6px;font-size:9px;background:rgba(0,0,0,.15);border-radius:8px;padding:1px 5px}

/* ── SLOT GRID — fully rebuilt ── */
.slot-wrap{margin-left:35px;margin-top:-2px;max-width:86%}
.slot-header{font-size:11px;color:var(--sub);font-weight:500;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between}
.slot-legend{display:flex;align-items:center;gap:10px;font-size:10px;color:var(--sub)}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-dot{width:8px;height:8px;border-radius:50%}
.slot-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}

/* Slot button states */
.slot-btn{
  padding:9px 6px;border-radius:9px;
  font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;
  cursor:pointer;text-align:center;transition:all .18s;
  border:1.5px solid;position:relative;
  user-select:none;
}
/* Available */
.slot-btn.available{
  border-color:var(--blue);background:#eff6ff;color:var(--blue);
}
.slot-btn.available:hover{background:var(--blue);color:#fff;transform:scale(1.03)}
.slot-btn.available:active{transform:scale(.97)}

/* Selected by THIS user */
.slot-btn.selected{
  border-color:var(--green);background:var(--green);color:#fff;
  box-shadow:0 2px 8px rgba(45,106,79,.3);
}

/* Being locked (another user selecting) */
.slot-btn.locking{
  border-color:var(--amber);background:#fffbeb;color:var(--amber);
  animation:flicker .6s infinite;
  pointer-events:none;
}
@keyframes flicker{0%,100%{opacity:1}50%{opacity:.6}}

/* Booked (taken) */
.slot-btn.booked{
  border-color:#e5e7eb;background:#f9fafb;color:#9ca3af;
  pointer-events:none;text-decoration:line-through;
}
.slot-btn.booked::after{
  content:'✓';position:absolute;top:2px;right:4px;font-size:8px;color:#9ca3af;
}

/* Conflict flash */
.slot-btn.conflict{
  border-color:var(--red);background:#fef2f2;color:var(--red);
  animation:shake .4s ease;
  pointer-events:none;
}
@keyframes shake{0%,100%{transform:none}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* Confirm button */
.slot-confirm-row{margin-top:8px}
.slot-confirm-btn{
  width:100%;padding:10px;border-radius:10px;
  background:var(--green);color:#fff;border:none;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.slot-confirm-btn:hover{background:#245a41}
.slot-confirm-btn:disabled{background:#9ca3af;cursor:not-allowed}

/* Booking confirmed card */
.conf-card{
  margin-left:35px;max-width:86%;
  background:linear-gradient(135deg,#1a3a2a,#1a2c3a);
  border-radius:16px;padding:15px;animation:up .4s ease;
  box-shadow:0 4px 16px rgba(0,0,0,.15);
}
.conf-emoji{font-size:24px;text-align:center;margin-bottom:8px}
.conf-title{font-size:15px;font-weight:700;color:#fff;text-align:center;margin-bottom:8px}
.conf-detail{background:rgba(255,255,255,.1);border-radius:10px;padding:10px 12px;margin-bottom:10px}
.conf-row{font-size:12px;color:rgba(255,255,255,.9);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.conf-row:last-child{margin-bottom:0}
.conf-msg{font-size:12px;color:rgba(255,255,255,.7);text-align:center;line-height:1.6;margin-bottom:6px}
.conf-foot{font-size:11px;color:rgba(255,255,255,.4);text-align:center}

/* Conflict notice */
.conflict-notice{
  margin-left:35px;max-width:86%;
  background:#fef2f2;border:1.5px solid #fca5a5;
  border-radius:12px;padding:11px 13px;animation:up .3s ease;
}
.cn-title{font-size:13px;font-weight:600;color:var(--red);margin-bottom:4px}
.cn-desc{font-size:12px;color:#991b1b;line-height:1.5}

/* Lang card */
.lcard{margin-left:35px;margin-top:-2px;max-width:86%;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:11px}
.lcard-t{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.lgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.lbtn{padding:9px 7px;border-radius:9px;border:1.5px solid var(--border);background:var(--bg);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;text-align:center;transition:all .15s;color:var(--text)}
.lbtn:hover{border-color:var(--green);background:#d8f3dc;color:var(--green)}
.lbtn .fl{font-size:18px;display:block;margin-bottom:2px}
.lbtn .ln{font-weight:600;display:block;font-size:12px}
.lbtn.pk{background:var(--green);border-color:var(--green);color:#fff;pointer-events:none}

/* Emergency */
.em{display:none;margin:3px 10px 0;background:#fff1f0;border:1px solid #fca5a5;border-radius:9px;padding:7px 10px;font-size:11.5px;color:#991b1b;align-items:center;gap:6px}
.em.show{display:flex}

/* Input */
.inp-row{display:flex;gap:6px;align-items:center;padding:9px 10px 11px;background:var(--white);border-top:1px solid var(--border)}
.inp{flex:1;border:1.5px solid var(--border);border-radius:22px;padding:8px 13px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--green)}
.sbtn{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--blue));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sbtn i{font-size:14px;color:#fff}
.pw{text-align:center;font-size:10px;color:#bbb;padding:5px 0 8px;background:var(--white)}
</style>
</head>
<body>
<div class="shell">
  <div class="hdr">
    <div class="av"><div class="av-l">M</div><div class="dot"></div></div>
    <div style="flex:1">
      <div class="hname">Mia — Smart Booking</div>
      <div class="hsub">Zahnarztpraxis Bodensee · No double-booking ✓</div>
    </div>
    <div class="badge">Live ✓</div>
  </div>
  <div class="sbar">
    <div class="sbar-left">
      <div class="sdot"></div>
      <span>Real-time availability · Anti double-booking</span>
    </div>
    <span class="user-count" id="ucount">● 1 active</span>
  </div>
  <div class="em" id="em">🚨 Emergency — 📞 <b>0800 20 21 22</b></div>
  <div class="chat" id="chat"></div>
  <div class="inp-row">
    <input class="inp" id="inp" placeholder="Type here..." onkeydown="if(event.key==='Enter')send()"/>
    <button class="sbtn" onclick="send()"><i class="ti ti-send"></i></button>
  </div>
  <div class="pw">Anti double-booking · Real-time slots · Built by Sagar · Bregenz</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// BOOKING STATE — simulates a shared server state
// In production this would be a Firebase/Supabase realtime DB
// ═══════════════════════════════════════════════════════════════

// Shared availability store — persisted in sessionStorage to simulate
// multiple users in the same browser session
var STORE_KEY = 'mia_booking_store_v1';

function getStore(){
  try{
    var raw = sessionStorage.getItem(STORE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return buildDefaultStore();
}

function saveStore(store){
  try{ sessionStorage.setItem(STORE_KEY, JSON.stringify(store)); }catch(e){}
}

function buildDefaultStore(){
  return {
    availability: {
      '2026-05-19': ['09:00','10:30','11:00','14:00','14:30','15:30'],
      '2026-05-20': ['08:30','09:00','11:00','13:00','14:00','16:00'],
      '2026-05-21': ['09:30','10:00','11:30','14:30','15:00'],
      '2026-05-22': ['09:00','10:30','11:00','15:00','16:30'],
      '2026-05-23': ['09:00','10:00','14:00','15:30']
    },
    locked: {},    // slot -> {userId, expires}
    booked: {},    // "date|slot" -> {name, userId, time}
    version: 1
  };
}

// Generate a unique user session ID
var MY_USER_ID = 'u_' + Math.random().toString(36).substr(2,8);
var LOCK_TTL = 8000; // 8 seconds lock while confirming

function isBooked(store, date, slot){
  return !!store.booked[date+'|'+slot];
}
function isLocked(store, date, slot){
  var key = date+'|'+slot;
  var lock = store.locked[key];
  if(!lock) return false;
  if(Date.now() > lock.expires){ delete store.locked[key]; saveStore(store); return false; }
  return lock.userId !== MY_USER_ID; // locked by ANOTHER user
}
function isMyLock(store, date, slot){
  var key = date+'|'+slot;
  var lock = store.locked[key];
  return lock && lock.userId === MY_USER_ID && Date.now() < lock.expires;
}
function lockSlot(store, date, slot){
  store.locked[date+'|'+slot] = {userId: MY_USER_ID, expires: Date.now()+LOCK_TTL};
  saveStore(store);
}
function unlockSlot(store, date, slot){
  delete store.locked[date+'|'+slot];
  saveStore(store);
}
function bookSlot(store, date, slot, name){
  var key = date+'|'+slot;
  // Final check — make sure nobody booked while we were confirming
  if(store.booked[key]) return false;
  store.booked[key] = {name:name, userId:MY_USER_ID, time:new Date().toISOString()};
  // Remove from availability
  if(store.availability[date]){
    store.availability[date] = store.availability[date].filter(function(s){return s!==slot;});
  }
  delete store.locked[key];
  saveStore(store);
  return true;
}
function getSlotsForDate(store, date){
  return (store.availability[date]||[]).filter(function(s){
    return !isBooked(store, date, s);
  });
}

// ═══════════════════════════════════════════════════════════════
// AGENT STATE
// ═══════════════════════════════════════════════════════════════
var _lang=null,_busy=false,_state='boot',_choices=[];
var _booking={name:'',date:'',slot:''};
var _selectedSlot=null;
var _slotWrapId=null;
var EMER=/notfall|emergency|schmerz|pain|blutung|schwellung|toothache/i;

// Simulate other users booking occasionally
var _otherUserTimer=null;
function simulateOtherUsers(){
  _otherUserTimer=setInterval(function(){
    if(Math.random()<0.3){
      var store=getStore();
      var dates=Object.keys(store.availability);
      if(!dates.length) return;
      var date=dates[Math.floor(Math.random()*dates.length)];
      var slots=getSlotsForDate(store,date);
      if(!slots.length) return;
      var slot=slots[Math.floor(Math.random()*slots.length)];
      // Simulate another user booking if not our current selection
      if(slot!==_selectedSlot || date!==_booking.date){
        bookSlot(store,date,slot,'Demo User');
        refreshSlotGrid();
        updateUserCount();
      }
    }
  },12000);
}

function updateUserCount(){
  var count = 1 + Math.floor(Math.random()*3);
  var el=document.getElementById('ucount');
  if(el) el.textContent='● '+count+' active';
}

// ═══════════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════════
function CH(){return document.getElementById('chat')}
function Q(id){return document.getElementById(id)}
function scroll(){var c=CH();c.scrollTop=c.scrollHeight}
function md(t){return t.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>')}

function addMsg(t,r){
  var d=document.createElement('div');
  d.className='msg'+(r==='u'?' u':'');
  var av=r==='u'?'<div class="mav u">U</div>':'<div class="mav b">M</div>';
  d.innerHTML=av+'<div class="bub '+r+'">'+md(t)+'</div>';
  CH().appendChild(d);scroll();
}
function typing(on){
  var t=Q('_typ');
  if(on){if(t)return;var d=document.createElement('div');d.id='_typ';d.className='msg';d.innerHTML='<div class="mav b">M</div><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div>';CH().appendChild(d);scroll();}
  else{if(t)t.remove();}
}
function say(txt,cb){_busy=true;typing(true);setTimeout(function(){typing(false);addMsg(txt,'b');_busy=false;if(cb)cb();},700+Math.random()*300);}
function clearUI(){
  ['_cw','_dw','_sw','_ls'].forEach(function(id){var e=Q(id);if(e)e.remove();});
  if(_otherUserTimer){clearInterval(_otherUserTimer);_otherUserTimer=null;}
}
function showChoices(list){
  var w=document.createElement('div');w.id='_cw';w.className='cw';
  var h='<div class="cs">';
  list.forEach(function(c,i){h+='<button class="cb'+(c.s?' sc':'')+'" data-i="'+i+'">'+c.l+'</button>';});
  h+='</div>';w.innerHTML=h;
  w.addEventListener('click',function(e){
    var btn=e.target.closest('[data-i]');if(!btn||_busy)return;
    var c=_choices[parseInt(btn.getAttribute('data-i'))];if(!c)return;
    btn.classList.add('pk');var l=c.l,n=c.n;
    setTimeout(function(){clearUI();addMsg(l,'u');goNode(n);},200);
  });
  CH().appendChild(w);scroll();_choices=list;
}
function showLangCard(){
  var c=document.createElement('div');c.id='_ls';c.className='lcard';
  c.innerHTML='<div class="lcard-t">🌐 Please choose your language</div><div class="lgrid"><button class="lbtn" id="_le"><span class="fl">🇬🇧</span><span class="ln">English</span></button><button class="lbtn" id="_ld"><span class="fl">🇩🇪</span><span class="ln">Deutsch</span></button></div>';
  CH().appendChild(c);scroll();
  Q('_le').addEventListener('click',function(){pickLang('en',this);});
  Q('_ld').addEventListener('click',function(){pickLang('de',this);});
}
function pickLang(l,btn){
  if(btn)btn.classList.add('pk');_lang=l;
  Q('inp').placeholder=l==='de'?'Antworten Sie Mia...':'Reply to Mia...';
  setTimeout(function(){
    clearUI();addMsg(l==='en'?'🇬🇧 English':'🇩🇪 Deutsch','u');
    say(l==='de'?'Wunderbar! 🇩🇪 Willkommen bei der **Zahnarztpraxis Bodensee**!\n\nIch bin **Mia** — 24/7 für Sie da.':'Wonderful! 🇬🇧 Welcome to **Zahnarztpraxis Bodensee**!\n\nI\'m **Mia** — here for you 24/7.',function(){mainMenu();});
  },250);
}
function mainMenu(){
  showChoices(_lang==='de'
    ?[{l:'📅 Termin vereinbaren',n:'n_name',s:1},{l:'⏰ Öffnungszeiten',n:'hours'},{l:'💳 Kassen',n:'insur'},{l:'📍 Kontakt',n:'cont'},{l:'🚨 Notfall',n:'emer'}]
    :[{l:'📅 Book appointment',n:'n_name',s:1},{l:'⏰ Opening hours',n:'hours'},{l:'💳 Insurance',n:'insur'},{l:'📍 Contact',n:'cont'},{l:'🚨 Emergency',n:'emer'}]);
}

// ═══════════════════════════════════════════════════════════════
// DATE PICKER
// ═══════════════════════════════════════════════════════════════
var DAYS_EN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var DAYS_DE=['So','Mo','Di','Mi','Do','Fr','Sa'];
var MO_EN=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var MO_DE=['','Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
var MO_LONG_EN=['','January','February','March','April','May','June','July','August','September','October','November','December'];
var MO_LONG_DE=['','Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

function getDayInfo(ds){
  var p=ds.split('-');var d=new Date(+p[0],+p[1]-1,+p[2]);
  return{day:d.getDay(),date:+p[2],month:+p[1],year:+p[0]};
}

function showDatePicker(){
  var store=getStore();
  var dates=Object.keys(store.availability).filter(function(d){
    return getSlotsForDate(store,d).length>0;
  });

  if(!dates.length){
    say(_lang==='de'?'Leider sind derzeit keine Termine verfügbar. Bitte versuchen Sie es später.':'Unfortunately no appointments are available right now. Please try again later.');
    return;
  }

  var wrap=document.createElement('div');wrap.id='_dw';wrap.className='date-wrap';
  var grid=document.createElement('div');grid.className='date-grid';

  dates.forEach(function(ds){
    var info=getDayInfo(ds);
    var slotCount=getSlotsForDate(store,ds).length;
    var btn=document.createElement('button');btn.className='date-btn';
    var dayN=_lang==='de'?DAYS_DE[info.day]:DAYS_EN[info.day];
    var monN=_lang==='de'?MO_DE[info.month]:MO_EN[info.month];
    btn.innerHTML=
      '<span class="date-day">'+dayN+' '+info.date+' '+monN+'</span>'+
      '<span class="date-sub slots-badge">'+slotCount+' '+(_lang==='de'?'frei':'free')+'</span>';

    btn.addEventListener('click',function(){
      // Recheck availability at moment of click
      var s2=getStore();
      var fresh=getSlotsForDate(s2,ds);
      if(!fresh.length){
        btn.classList.add('dm');
        addMsg(_lang==='de'?'⚠️ Dieser Tag ist leider ausgebucht. Bitte wählen Sie einen anderen.':'⚠️ This date is fully booked. Please choose another.','b');
        return;
      }
      grid.querySelectorAll('.date-btn').forEach(function(b){b.classList.add('dm');});
      btn.classList.remove('dm');btn.classList.add('pk');
      _booking.date=ds;
      setTimeout(function(){
        var dw=Q('_dw');if(dw)dw.remove();
        addMsg(dayN+' '+info.date+' '+monN,'u');
        showSlotPicker(ds);
      },200);
    });
    grid.appendChild(btn);
  });

  wrap.appendChild(grid);CH().appendChild(wrap);scroll();
}

// ═══════════════════════════════════════════════════════════════
// SLOT PICKER — with real-time state + double-booking prevention
// ═══════════════════════════════════════════════════════════════
var _slotRefreshTimer=null;

function showSlotPicker(date){
  _selectedSlot=null;
  var store=getStore();
  var allSlots=store.availability[date]||[];

  if(!allSlots.length){
    say(_lang==='de'?'Für diesen Tag sind leider keine Termine mehr verfügbar.\n\nBitte wählen Sie einen anderen Tag:':'No slots available for this date.\n\nPlease choose another date:',
    function(){showDatePicker();});
    return;
  }

  var wrap=document.createElement('div');wrap.id='_sw';wrap.className='slot-wrap';

  // Header with legend
  var hdr=document.createElement('div');hdr.className='slot-header';
  hdr.innerHTML=
    '<span>'+(_lang==='de'?'Tippen um zu wählen:':'Tap to select:')+'</span>'+
    '<div class="slot-legend">'+
      '<div class="legend-item"><div class="legend-dot" style="background:#2563eb"></div>'+(_lang==='de'?'Frei':'Free')+'</div>'+
      '<div class="legend-item"><div class="legend-dot" style="background:#d97706"></div>'+(_lang==='de'?'Reserviert':'Held')+'</div>'+
      '<div class="legend-item"><div class="legend-dot" style="background:#9ca3af"></div>'+(_lang==='de'?'Gebucht':'Booked')+'</div>'+
    '</div>';
  wrap.appendChild(hdr);

  var grid=document.createElement('div');grid.id='_sg';grid.className='slot-grid';
  wrap.appendChild(grid);

  // Confirm button
  var confirmRow=document.createElement('div');confirmRow.className='slot-confirm-row';
  var confirmBtn=document.createElement('button');
  confirmBtn.className='slot-confirm-btn';
  confirmBtn.id='_scb';
  confirmBtn.disabled=true;
  confirmBtn.innerHTML='<i class="ti ti-calendar-check" style="font-size:15px"></i> '+(_lang==='de'?'Termin bestätigen':'Confirm appointment');
  confirmBtn.addEventListener('click',function(){confirmSlot(date);});
  confirmRow.appendChild(confirmBtn);
  wrap.appendChild(confirmRow);

  CH().appendChild(wrap);scroll();

  renderSlotButtons(date, allSlots);

  // Start real-time refresh
  _slotRefreshTimer=setInterval(function(){refreshSlotGrid();},2500);

  // Simulate other users
  simulateOtherUsers();
  updateUserCount();
}

function renderSlotButtons(date, allSlots){
  var grid=Q('_sg');if(!grid)return;
  var store=getStore();
  grid.innerHTML='';

  allSlots.forEach(function(slot){
    var btn=document.createElement('button');
    btn.className='slot-btn';
    btn.setAttribute('data-slot',slot);
    btn.textContent=slot;

    var booked=isBooked(store,date,slot);
    var locked=isLocked(store,date,slot);
    var mySelected=(_selectedSlot===slot);

    if(booked){
      btn.classList.add('booked');
      btn.setAttribute('title',_lang==='de'?'Bereits gebucht':'Already booked');
    } else if(locked){
      btn.classList.add('locking');
      btn.setAttribute('title',_lang==='de'?'Wird gerade reserviert...':'Being held by another user...');
    } else if(mySelected){
      btn.classList.add('selected');
    } else {
      btn.classList.add('available');
      btn.addEventListener('click',function(){selectSlot(date,slot,btn);});
    }
    grid.appendChild(btn);
  });
}

function selectSlot(date, slot, btn){
  var store=getStore();

  // Check if still available
  if(isBooked(store,date,slot)){
    btn.classList.remove('available');btn.classList.add('conflict');
    showConflictNotice(slot);
    setTimeout(function(){refreshSlotGrid();},1000);
    return;
  }
  if(isLocked(store,date,slot)){
    btn.classList.add('locking');
    showConflictNotice(slot);
    return;
  }

  // Release previous lock if any
  if(_selectedSlot && _selectedSlot!==slot){
    unlockSlot(store,_booking.date,_selectedSlot);
  }

  // Lock this slot
  lockSlot(store,date,slot);
  _selectedSlot=slot;
  _booking.slot=slot;

  // Update UI
  refreshSlotGrid();

  // Enable confirm button
  var cb=Q('_scb');
  if(cb){
    cb.disabled=false;
    cb.innerHTML='<i class="ti ti-calendar-check" style="font-size:15px"></i> '+
      (_lang==='de'?'Bestätigen: '+slot:'Confirm: '+slot);
  }

  // Auto-release lock after TTL
  setTimeout(function(){
    var s2=getStore();
    if(isMyLock(s2,date,slot) && _selectedSlot===slot){
      unlockSlot(s2,date,slot);
      _selectedSlot=null;
      refreshSlotGrid();
      var cb2=Q('_scb');if(cb2){cb2.disabled=true;cb2.innerHTML='<i class="ti ti-calendar-check" style="font-size:15px"></i> '+(_lang==='de'?'Termin bestätigen':'Confirm appointment');}
      addMsg(_lang==='de'?'⏰ Ihre Reservierung ist abgelaufen. Bitte wählen Sie erneut einen Termin.':'⏰ Your hold expired. Please select a slot again.','b');
    }
  },LOCK_TTL);

  scroll();
}

function refreshSlotGrid(){
  var sw=Q('_sw');if(!sw)return;
  var store=getStore();
  var date=_booking.date;
  var allSlots=store.availability[date];
  if(!allSlots) return;
  renderSlotButtons(date,allSlots);
  // Re-attach confirm listener
  var cb=Q('_scb');
  if(cb){
    cb.disabled=!_selectedSlot||isBooked(store,date,_selectedSlot||'');
  }
}

function showConflictNotice(slot){
  var old=Q('_cn');if(old)old.remove();
  var n=document.createElement('div');n.id='_cn';n.className='conflict-notice';
  n.innerHTML=
    '<div class="cn-title">⚠️ '+(_lang==='de'?'Termin nicht mehr verfügbar':'Slot no longer available')+'</div>'+
    '<div class="cn-desc">'+(_lang==='de'?'Der Termin <b>'+slot+'</b> wurde gerade von jemand anderem reserviert. Bitte wählen Sie einen anderen.':'The slot <b>'+slot+'</b> was just taken by another user. Please choose a different time.')+'</div>';
  CH().appendChild(n);scroll();
  setTimeout(function(){var e=Q('_cn');if(e)e.remove();},4000);
}

function confirmSlot(date){
  if(!_selectedSlot) return;

  var store=getStore();

  // FINAL double-booking check at confirmation moment
  if(isBooked(store,date,_selectedSlot)){
    _selectedSlot=null;
    showConflictNotice(_selectedSlot||'this slot');
    refreshSlotGrid();
    var cb=Q('_scb');if(cb){cb.disabled=true;}
    return;
  }
  if(isLocked(store,date,_selectedSlot)){
    showConflictNotice(_selectedSlot);
    return;
  }

  // Book it
  var success=bookSlot(store,date,_selectedSlot,_booking.name);
  if(!success){
    // Race condition — someone booked between our check and write
    showConflictNotice(_selectedSlot);
    _selectedSlot=null;
    refreshSlotGrid();
    return;
  }

  // Stop refresh timer
  if(_slotRefreshTimer){clearInterval(_slotRefreshTimer);_slotRefreshTimer=null;}

  var slot=_selectedSlot;
  _selectedSlot=null;

  // Remove slot UI
  var sw=Q('_sw');if(sw)sw.remove();

  addMsg(slot,'u');

  // Show confirmation
  setTimeout(function(){
    showBookingConfirmed(date,slot,_booking.name);
  },300);
}

function showBookingConfirmed(date, slot, name){
  // Warm message
  var tDE='Vielen herzlichen Dank, **'+name+'**! 🙏\n\nIhr Termin ist **sofort bestätigt** und für andere Nutzer nicht mehr buchbar.\n\nBitte erscheinen Sie ca. **10 Minuten früher** und bringen Sie Ihre **e-card** mit. Bis bald! 😊';
  var tEN='Thank you so much, **'+name+'**! 🙏\n\nYour appointment is **instantly confirmed** and removed from availability for all other users.\n\nPlease arrive **10 minutes early** with your **health insurance card**. See you soon! 😊';

  say(_lang==='de'?tDE:tEN,function(){
    var info=getDayInfo(date);
    var mo=_lang==='de'?MO_LONG_DE:MO_LONG_EN;
    var dl=info.date+'. '+mo[info.month]+' '+info.year;

    var card=document.createElement('div');card.className='conf-card';
    card.innerHTML=
      '<div class="conf-emoji">🦷✨</div>'+
      '<div class="conf-title">'+(_lang==='de'?'Termin bestätigt!':'Appointment Confirmed!')+'</div>'+
      '<div class="conf-detail">'+
        '<div class="conf-row">📅 <span><b>'+(_lang==='de'?'Datum':'Date')+':</b> '+dl+'</span></div>'+
        '<div class="conf-row">🕐 <span><b>'+(_lang==='de'?'Uhrzeit':'Time')+':</b> '+slot+' Uhr</span></div>'+
        '<div class="conf-row">👤 <span><b>Name:</b> '+name+'</span></div>'+
        '<div class="conf-row">📍 <span>Bahnhofstraße 12, 6900 Bregenz</span></div>'+
        '<div class="conf-row">📞 <span>+43 5574 123 456</span></div>'+
      '</div>'+
      '<div class="conf-msg">'+(_lang==='de'?'💚 Dieser Slot ist jetzt für alle anderen Nutzer gesperrt.<br>Wir freuen uns auf Ihren Besuch!':'💚 This slot is now locked for all other users.<br>We look forward to seeing you!')+'</div>'+
      '<div class="conf-foot">✓ Zahnarztpraxis Bodensee · Bregenz</div>';
    CH().appendChild(card);scroll();

    setTimeout(function(){
      showChoices(_lang==='de'
        ?[{l:'📅 Weiteren Termin buchen',n:'n_name',s:1},{l:'🏠 Hauptmenü',n:'main'}]
        :[{l:'📅 Book another appointment',n:'n_name',s:1},{l:'🏠 Main menu',n:'main'}]);
    },800);
  });
}

// ═══════════════════════════════════════════════════════════════
// NODES
// ═══════════════════════════════════════════════════════════════
var N={
  n_name:{r:function(){
    say(_lang==='de'?'Gerne helfe ich beim Terminbuchen! 📅\n\nDarf ich Ihren **Namen** erfahren?':'I\'d love to help you book! 📅\n\nCould I have your **name** please?');
    _state='n_name';
  }},
  n_date:{r:function(){
    say(_lang==='de'?'Danke, **'+_booking.name+'**! 😊\n\nBitte wählen Sie einen **verfügbaren Tag** — nur Tage mit freien Plätzen werden angezeigt:':'Thank you, **'+_booking.name+'**! 😊\n\nPlease choose an **available day** — only days with free slots are shown:',
    function(){showDatePicker();});
    _state='n_date';
  }},
  hours:{r:function(){say(_lang==='de'?'**Öffnungszeiten:**\nMo–Do: 08:00–18:00\nFr: 08:00–13:00\nSa–So: Geschlossen\n\n🚨 Notfall: 📞 **0800 20 21 22**':'**Opening hours:**\nMon–Thu: 08:00–18:00\nFri: 08:00–13:00\nSat–Sun: Closed\n\n🚨 Emergency: 📞 **0800 20 21 22**',function(){showChoices(_lang==='de'?[{l:'📅 Termin',n:'n_name',s:1},{l:'🏠 Menü',n:'main'}]:[{l:'📅 Book',n:'n_name',s:1},{l:'🏠 Menu',n:'main'}]);});}},
  insur:{r:function(){say(_lang==='de'?'Wir akzeptieren:\n✅ **ÖGK** · ✅ **SVS** · ✅ **BVAEB**\nPrivatpatient:innen herzlich willkommen!':'We accept:\n✅ **ÖGK** · ✅ **SVS** · ✅ **BVAEB**\nPrivate patients welcome!',function(){showChoices(_lang==='de'?[{l:'📅 Termin',n:'n_name',s:1},{l:'🏠 Menü',n:'main'}]:[{l:'📅 Book',n:'n_name',s:1},{l:'🏠 Menu',n:'main'}]);});}},
  cont:{r:function(){say('📞 **+43 5574 123 456**\n📧 praxis@zahnarzt-bodensee.at\n📍 Bahnhofstraße 12, 6900 Bregenz',function(){showChoices(_lang==='de'?[{l:'📅 Termin',n:'n_name',s:1},{l:'🏠 Menü',n:'main'}]:[{l:'📅 Book',n:'n_name',s:1},{l:'🏠 Menu',n:'main'}]);});}},
  emer:{r:function(){Q('em').classList.add('show');setTimeout(function(){Q('em').classList.remove('show');},9000);say(_lang==='de'?'🚨 **Bitte nicht warten!**\n📞 **+43 5574 123 456**\n📞 **0800 20 21 22** — kostenlos, 24/7':'🚨 **Please do not wait!**\n📞 **+43 5574 123 456**\n📞 **0800 20 21 22** — free, 24/7',function(){showChoices(_lang==='de'?[{l:'🏠 Menü',n:'main'}]:[{l:'🏠 Menu',n:'main'}]);});}},
  main:{r:function(){say(_lang==='de'?'Wie kann ich Ihnen helfen?':'How can I help you?',function(){mainMenu();});}}
};
function goNode(key){if(!_lang||_busy)return;var n=N[key];if(n)n.r();}

function send(){
  var inp=Q('inp');var txt=inp.value.trim();if(!txt||_busy)return;
  inp.value='';clearUI();addMsg(txt,'u');
  if(!_lang){pickLang(/hallo|guten|zahnarzt|termin/i.test(txt)?'de':'en',null);return;}
  if(EMER.test(txt)){N.emer.r();return;}
  if(_state==='n_name'){_booking.name=txt;N.n_date.r();return;}
  var t=txt.toLowerCase();
  if(/termin|book|appoint/.test(t)){goNode('n_name');return;}
  if(/öffnung|hour|open/.test(t)){goNode('hours');return;}
  if(/kasse|insur/.test(t)){goNode('insur');return;}
  if(/kontakt|contact/.test(t)){goNode('cont');return;}
  if(/hallo|hello|hi |hey/.test(t)){goNode('main');return;}
  goNode('main');
}

// Init store if not exists
if(!sessionStorage.getItem(STORE_KEY)) saveStore(buildDefaultStore());
updateUserCount();

// Boot
setTimeout(function(){
  _busy=true;typing(true);
  setTimeout(function(){
    typing(false);
    addMsg('👋 **Welcome to Zahnarztpraxis Bodensee!**\n\nI\'m **Mia** — your smart booking assistant.\n\n✅ All slots are **real-time** — no double-booking possible\n✅ Slots update **instantly** after each booking\n\n🌐 Please choose your language:','b');
    _busy=false;showLangCard();_state='lang';
  },800);
},400);
</script>
