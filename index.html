<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display:ital@0;1&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f4f2ee;--dark:#1a1c2e;--green:#2d6a4f;--blue:#2563eb;--border:#ddd8ce;--white:#fff;--text:#1a1c2e;--red:#dc2626;--amber:#d97706}
html,body{min-height:100vh;font-family:'DM Sans',sans-serif;background:#e8e4dc;display:flex;align-items:center;justify-content:center;padding:10px}
.shell{width:100%;max-width:420px;border-radius:24px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.18);border:1px solid var(--border)}
.hdr{background:var(--dark);padding:13px 16px;display:flex;align-items:center;gap:11px}
.av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--blue));display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.av-l{font-family:'DM Serif Display',serif;font-size:20px;color:#fff;font-style:italic}
.dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:#52b788;border:2px solid var(--dark);animation:p2 2s infinite}
@keyframes p2{0%,100%{opacity:1}50%{opacity:.4}}
.hname{font-family:'DM Serif Display',serif;font-size:16px;color:#fff}
.hsub{font-size:10px;color:#9a9fbe;margin-top:1px}
.badge{font-size:10px;font-weight:600;text-transform:uppercase;background:#1D9E75;color:#fff;padding:3px 9px;border-radius:20px;margin-left:auto}
.sbar{background:#1e2240;padding:5px 14px;font-size:11px;color:#8fa3c8;display:flex;align-items:center;gap:6px}
.sdot{width:6px;height:6px;border-radius:50%;background:#52b788;flex-shrink:0}
.chat{height:440px;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:8px;background:var(--bg);scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:3px}
.chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{display:flex;gap:7px;align-items:flex-end;animation:up .2s ease both}
.msg.u{flex-direction:row-reverse}
@keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.mav{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff}
.mav.b{background:linear-gradient(135deg,var(--green),var(--blue));font-family:'DM Serif Display',serif;font-style:italic;font-size:15px}
.mav.u{background:#5a5047;font-weight:600;font-size:11px}
.bub{max-width:84%;padding:9px 13px;font-size:13px;line-height:1.65;border-radius:14px}
.bub.b{background:var(--white);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:3px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.bub.u{background:var(--green);color:#fff;border-bottom-right-radius:3px;border-bottom-left-radius:14px}
.typing{display:flex;align-items:center;gap:4px;padding:10px 13px;background:var(--white);border:1px solid var(--border);border-radius:14px;border-bottom-left-radius:3px;width:fit-content}
.td{width:5px;height:5px;border-radius:50%;background:#bbb;animation:bop .8s infinite}
.td:nth-child(2){animation-delay:.13s}.td:nth-child(3){animation-delay:.26s}
@keyframes bop{0%,60%,100%{transform:none}30%{transform:translateY(-4px)}}
.cw{margin-left:35px;margin-top:-2px;max-width:85%}
.cs{display:flex;flex-direction:column;gap:4px}
.cb{text-align:left;padding:8px 12px;border-radius:9px;border:1.5px solid var(--green);background:transparent;color:var(--green);font-size:12.5px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s}
.cb:hover{background:var(--green);color:#fff}
.cb.sc{border-color:var(--blue);color:var(--blue)}
.cb.sc:hover{background:var(--blue);color:#fff}
.cb.pk{opacity:.55;pointer-events:none}
.dw{margin-left:35px;margin-top:-2px;max-width:85%}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.dbtn{padding:11px 8px;border-radius:11px;border:1.5px solid var(--green);background:#f6fbf8;color:var(--green);font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;text-align:center;transition:all .16s;line-height:1.4}
.dbtn:hover{background:var(--green);color:#fff;transform:scale(1.02)}
.dbtn.pk{background:var(--green);color:#fff;pointer-events:none}
.dbtn.dm{opacity:.35;pointer-events:none}
.dbtn-day{font-size:13px;font-weight:600;display:block}
.dbtn-sub{font-size:10px;display:block;margin-top:1px;opacity:.8}
.sw{margin-left:35px;margin-top:-2px;max-width:85%}
.sw-hdr{font-size:11px;color:#6b7080;font-weight:500;margin-bottom:6px;display:flex;justify-content:space-between}
.sw-leg{display:flex;gap:8px;font-size:10px;color:#6b7080}
.sw-li{display:flex;align-items:center;gap:3px}
.sw-dot{width:7px;height:7px;border-radius:50%}
.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.sbtn{padding:9px 6px;border-radius:9px;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;text-align:center;transition:all .18s;border:1.5px solid;position:relative;user-select:none}
.sbtn.av{border-color:var(--blue);background:#eff6ff;color:var(--blue)}
.sbtn.av:hover{background:var(--blue);color:#fff;transform:scale(1.03)}
.sbtn.sel{border-color:var(--green);background:var(--green);color:#fff}
.sbtn.lk{border-color:var(--amber);background:#fffbeb;color:var(--amber);pointer-events:none;animation:flk .6s infinite}
@keyframes flk{0%,100%{opacity:1}50%{opacity:.55}}
.sbtn.bk{border-color:#e5e7eb;background:#f9fafb;color:#9ca3af;pointer-events:none;text-decoration:line-through}
.sbtn.bk::after{content:'✓';position:absolute;top:2px;right:4px;font-size:8px;color:#9ca3af}
.sbtn.cf{border-color:var(--red);background:#fef2f2;color:var(--red);pointer-events:none;animation:shk .4s ease}
@keyframes shk{0%,100%{transform:none}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.scr{margin-top:8px}
.scbtn{width:100%;padding:10px;border-radius:10px;background:var(--green);color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.scbtn:hover{background:#245a41}
.scbtn:disabled{background:#9ca3af;cursor:not-allowed}
.cfn{margin-left:35px;max-width:85%;background:#fef2f2;border:1.5px solid #fca5a5;border-radius:12px;padding:10px 13px;animation:up .3s ease}
.cfn-t{font-size:13px;font-weight:600;color:var(--red);margin-bottom:3px}
.cfn-d{font-size:12px;color:#991b1b;line-height:1.5}
.cc{margin-left:35px;max-width:85%;background:linear-gradient(135deg,#1a3a2a,#1a2c3a);border-radius:16px;padding:15px;animation:up .4s ease}
.cc-e{font-size:24px;text-align:center;margin-bottom:8px}
.cc-t{font-size:15px;font-weight:700;color:#fff;text-align:center;margin-bottom:8px}
.cc-d{background:rgba(255,255,255,.1);border-radius:10px;padding:10px 12px;margin-bottom:10px}
.cc-r{font-size:12px;color:rgba(255,255,255,.9);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.cc-r:last-child{margin-bottom:0}
.cc-m{font-size:12px;color:rgba(255,255,255,.7);text-align:center;line-height:1.6;margin-bottom:6px}
.cc-f{font-size:11px;color:rgba(255,255,255,.4);text-align:center}
.ldw{margin-left:35px;margin-top:-2px;max-width:85%;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.ldd{display:flex;justify-content:center;gap:6px;margin-bottom:8px}
.ldd-d{width:8px;height:8px;border-radius:50%;background:var(--green);animation:bop .8s infinite}
.ldd-d:nth-child(2){animation-delay:.15s}.ldd-d:nth-child(3){animation-delay:.3s}
.ldt{font-size:12px;color:#6b7080}
.lc{margin-left:35px;margin-top:-2px;max-width:85%;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:11px}
.lc-t{font-size:11px;font-weight:600;color:#6b7080;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.lcg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.lbtn{padding:9px 7px;border-radius:9px;border:1.5px solid var(--border);background:var(--bg);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;text-align:center;transition:all .15s;color:var(--text)}
.lbtn:hover{border-color:var(--green);background:#d8f3dc;color:var(--green)}
.lbtn .fl{font-size:18px;display:block;margin-bottom:2px}
.lbtn .ln{font-weight:600;display:block}
.lbtn.pk{background:var(--green);border-color:var(--green);color:#fff;pointer-events:none}
.em{display:none;margin:3px 10px 0;background:#fff1f0;border:1px solid #fca5a5;border-radius:9px;padding:7px 10px;font-size:11.5px;color:#991b1b;align-items:center;gap:6px}
.em.show{display:flex}
.inp-row{display:flex;gap:6px;align-items:center;padding:9px 10px 11px;background:var(--white);border-top:1px solid var(--border)}
.inp{flex:1;border:1.5px solid var(--border);border-radius:22px;padding:8px 13px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--green)}
.ibtn{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--blue));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ibtn i{font-size:14px;color:#fff}
.pw{text-align:center;font-size:10px;color:#bbb;padding:5px 0 8px;background:var(--white)}
</style>

<body>
<div class="shell">
  <div class="hdr">
    <div class="av"><div class="av-l">M</div><div class="dot"></div></div>
    <div style="flex:1"><div class="hname">Mia — Zahnarztpraxis Bodensee</div><div class="hsub">Bregenz · Live Google Calendar · Auto updates ✓</div></div>

  </div>

<script>
var DW='https://hook.eu1.make.com/zptsevqebf4pxudums3j9iuoihcpoo8h';
var SW='https://hook.eu1.make.com/v4npacx24t2c2e1zux5ul2b9oalse3ut';

// Double-booking store
var SK='mia_v3';
function gs(){try{var r=sessionStorage.getItem(SK);if(r)return JSON.parse(r);}catch(e){}return{booked:{},locked:{}};}
function ss(s){try{sessionStorage.setItem(SK,JSON.stringify(s));}catch(e){}}
var UID='u_'+Math.random().toString(36).substr(2,8);
var LT=10000;
function isB(s,d,t){return!!s.booked[d+'|'+t];}
function isLO(s,d,t){var l=s.locked[d+'|'+t];if(!l)return false;if(Date.now()>l.e){delete s.locked[d+'|'+t];ss(s);return false;}return l.u!==UID;}
function lk(s,d,t){s.locked[d+'|'+t]={u:UID,e:Date.now()+LT};ss(s);}
function bk(s,d,t,n){var k=d+'|'+t;if(s.booked[k])return false;s.booked[k]={n:n,t:new Date().toISOString()};delete s.locked[k];ss(s);return true;}
function ul(s,d,t){var l=s.locked[d+'|'+t];if(l&&l.u===UID){delete s.locked[d+'|'+t];ss(s);}}

var _l=null,_b=false,_s='boot',_ch=[],_bk={name:'',date:'',slot:''};
var _ss=null,_ld=[],_ls=[],_rt=null;
var EMER=/notfall|emergency|schmerz|pain|blutung|toothache/i;
var DE=['So','Mo','Di','Mi','Do','Fr','Sa'],EN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var MDE=['','Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
var MEN=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var MLDE=['','Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
var MLEN=['','January','February','March','April','May','June','July','August','September','October','November','December'];

function gi(ds){var p=ds.split('-');var d=new Date(+p[0],+p[1]-1,+p[2]);return{w:d.getDay(),d:+p[2],m:+p[1],y:+p[0]};}
function dn(ds){var i=gi(ds);return(_l==='de'?DE:EN)[i.w];}
function dl(ds){var i=gi(ds);return i.d+' '+(_l==='de'?MDE:MEN)[i.m];}
function dlong(ds){var i=gi(ds);return i.d+'. '+(_l==='de'?MLDE:MLEN)[i.m]+' '+i.y;}

function CH(){return document.getElementById('chat')}
function Q(i){return document.getElementById(i)}
function sc(){CH().scrollTop=CH().scrollHeight}
function fm(t){return t.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>')}
function am(t,r){var d=document.createElement('div');d.className='msg'+(r==='u'?' u':'');d.innerHTML=(r==='u'?'<div class="mav u">U</div>':'<div class="mav b">M</div>')+'<div class="bub '+r+'">'+fm(t)+'</div>';CH().appendChild(d);sc();}
function ty(on){var t=Q('_ty');if(on){if(t)return;var d=document.createElement('div');d.id='_ty';d.className='msg';d.innerHTML='<div class="mav b">M</div><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div>';CH().appendChild(d);sc();}else{if(t)t.remove();}}
function say(txt,cb){_b=true;ty(true);setTimeout(function(){ty(false);am(txt,'b');_b=false;if(cb)cb();},650+Math.random()*300);}
function cu(){['_cw','_dw','_sw','_lc','_ldw'].forEach(function(i){var e=Q(i);if(e)e.remove();});}
function sc2(list){var w=document.createElement('div');w.id='_cw';w.className='cw';var h='<div class="cs">';list.forEach(function(c,i){h+='<button class="cb'+(c.s?' sc':'')+'" data-i="'+i+'">'+c.l+'</button>';});h+='</div>';w.innerHTML=h;w.addEventListener('click',function(e){var btn=e.target.closest('[data-i]');if(!btn||_b)return;var c=_ch[parseInt(btn.getAttribute('data-i'))];if(!c)return;btn.classList.add('pk');var l=c.l,n=c.n;setTimeout(function(){cu();am(l,'u');gn(n);},200);});CH().appendChild(w);sc();_ch=list;}
function showLC(){var c=document.createElement('div');c.id='_lc';c.className='lc';c.innerHTML='<div class="lc-t">🌐 Please choose your language</div><div class="lcg"><button class="lbtn" id="_le"><span class="fl">🇬🇧</span><span class="ln">English</span></button><button class="lbtn" id="_ld2"><span class="fl">🇩🇪</span><span class="ln">Deutsch</span></button></div>';CH().appendChild(c);sc();Q('_le').addEventListener('click',function(){pl('en',this);});Q('_ld2').addEventListener('click',function(){pl('de',this);});}
function pl(lng,btn){if(btn)btn.classList.add('pk');_l=lng;Q('inp').placeholder=lng==='de'?'Antworten Sie Mia...':'Reply to Mia...';setTimeout(function(){cu();am(lng==='en'?'🇬🇧 English':'🇩🇪 Deutsch','u');say(lng==='de'?'Wunderbar! 🇩🇪 Willkommen bei der **Zahnarztpraxis Bodensee**!\n\nIch bin **Mia** — 24/7 für Sie da.':'Wonderful! 🇬🇧 Welcome to **Zahnarztpraxis Bodensee**!\n\nI\'m **Mia** — here 24/7.',function(){mm();});},250);}
function mm(){sc2(_l==='de'?[{l:'📅 Termin vereinbaren',n:'nn',s:1},{l:'⏰ Öffnungszeiten',n:'nh'},{l:'💳 Kassen',n:'ni'},{l:'📍 Kontakt',n:'nc'},{l:'🚨 Notfall',n:'ne'}]:[{l:'📅 Book appointment',n:'nn',s:1},{l:'⏰ Opening hours',n:'nh'},{l:'💳 Insurance',n:'ni'},{l:'📍 Contact',n:'nc'},{l:'🚨 Emergency',n:'ne'}]);}
function loading(txt){var d=document.createElement('div');d.id='_ldw';d.className='ldw';d.innerHTML='<div class="ldd"><div class="ldd-d"></div><div class="ldd-d"></div><div class="ldd-d"></div></div><div class="ldt">'+txt+'</div>';CH().appendChild(d);sc();}

// ── PARSE RESPONSE ────────────────────────────────────────────
function parseDates(text){
  // Extract from {"dates":{"text":"..."}} or {"dates":"..."}
  var m=text.match(/"text"\s*:\s*"([^"]+)"/)||text.match(/"dates"\s*:\s*"([^"]+)"/);
  if(!m)return[];
  return m[1].split(',').map(function(x){
    return x.trim().replace(/T\d{2}:\d{2}:\d{2}.*Z$/,'').replace(/T00:00:00Z$/,'');
  }).filter(function(x){return/^\d{4}-\d{2}-\d{2}$/.test(x);});
}
function parseSlots(text){
  var m=text.match(/"slots"\s*:\s*"([^"]+)"/);
  if(!m||!m[1])return[];
  return m[1].split(',').map(function(s){return s.trim();}).filter(Boolean);
}

// ── FETCH ─────────────────────────────────────────────────────
async function fetchDates(){
  try{var r=await fetch(DW,{headers:{'Accept':'application/json'}});var t=await r.text();return parseDates(t);}catch(e){return[];}
}
async function fetchSlots(date){
  try{
    var r=await fetch(SW,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({date:date})});
    var t=await r.text();return parseSlots(t);
  }catch(e){return[];}
}

// ── DATE PICKER ───────────────────────────────────────────────
function showDatePicker(dates){
  var wrap=document.createElement('div');wrap.id='_dw';wrap.className='dw';
  var grid=document.createElement('div');grid.className='dgrid';
  dates.forEach(function(ds){
    var btn=document.createElement('button');btn.className='dbtn';
    btn.innerHTML='<span class="dbtn-day">'+dn(ds)+' '+dl(ds)+'</span><span class="dbtn-sub">📅 Tap to select</span>';
    btn.addEventListener('click',function(){
      grid.querySelectorAll('.dbtn').forEach(function(b){b.classList.add('dm');});
      btn.classList.remove('dm');btn.classList.add('pk');
      _bk.date=ds;
      setTimeout(function(){var dw=Q('_dw');if(dw)dw.remove();am(dn(ds)+' '+dl(ds),'u');doLoadSlots(ds);},200);
    });
    grid.appendChild(btn);
  });
  wrap.appendChild(grid);CH().appendChild(wrap);sc();
}

async function doLoadSlots(date){
  loading(_l==='de'?'Lade Zeitfenster...':'Loading time slots...');
  _b=true;
  var slots=await fetchSlots(date);
  var ldw=Q('_ldw');if(ldw)ldw.remove();
  _b=false;
  if(!slots.length){
    say(_l==='de'?'Keine Zeitfenster für dieses Datum.\n\nBitte wählen Sie ein anderes Datum:':'No time slots for this date.\n\nPlease choose another date:',function(){doLoadDates();});
    return;
  }
  _ls=slots;showSlotPicker(date,slots);
}

// ── SLOT PICKER ───────────────────────────────────────────────
function showSlotPicker(date,slots){
  var old=Q('_sw');if(old)old.remove();
  var store=gs();
  var wrap=document.createElement('div');wrap.id='_sw';wrap.className='sw';
  var hdr=document.createElement('div');hdr.className='sw-hdr';
  hdr.innerHTML='<span>'+(_l==='de'?'Zeitfenster wählen:':'Select time:')+'</span><div class="sw-leg"><div class="sw-li"><div class="sw-dot" style="background:var(--blue)"></div>'+(_l==='de'?'Frei':'Free')+'</div><div class="sw-li"><div class="sw-dot" style="background:var(--amber)"></div>'+(_l==='de'?'Reserviert':'Held')+'</div><div class="sw-li"><div class="sw-dot" style="background:#9ca3af"></div>'+(_l==='de'?'Gebucht':'Taken')+'</div></div>';
  wrap.appendChild(hdr);
  var grid=document.createElement('div');grid.id='_sg';grid.className='sgrid';
  slots.forEach(function(slot){
    var btn=document.createElement('button');btn.className='sbtn';btn.setAttribute('data-s',slot);btn.textContent=slot;
    if(isB(store,date,slot)){btn.classList.add('bk');}
    else if(isLO(store,date,slot)){btn.classList.add('lk');}
    else if(_ss===slot){btn.classList.add('sel');}
    else{btn.classList.add('av');btn.addEventListener('click',function(){selSlot(date,slot);});}
    grid.appendChild(btn);
  });
  wrap.appendChild(grid);
  var cr=document.createElement('div');cr.className='scr';
  var cb=document.createElement('button');cb.className='scbtn';cb.id='_scb';cb.disabled=true;
  cb.innerHTML='<i class="ti ti-calendar-check" style="font-size:15px"></i> '+(_l==='de'?'Termin bestätigen':'Confirm appointment');
  cb.addEventListener('click',function(){confSlot(date);});
  cr.appendChild(cb);wrap.appendChild(cr);
  CH().appendChild(wrap);sc();
  if(_rt)clearInterval(_rt);
  _rt=setInterval(function(){refreshGrid(date,slots);},3000);
}

function selSlot(date,slot){
  var store=gs();
  if(isB(store,date,slot)||isLO(store,date,slot)){showConflict(slot);refreshGrid(date,_ls);return;}
  if(_ss&&_ss!==slot)ul(store,date,_ss);
